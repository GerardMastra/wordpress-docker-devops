services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt:ro
      - ${RUNTIME_DIR}/certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    container_name: wp-certbot
    volumes:
     - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt
     - ${RUNTIME_DIR}/certbot/www:/var/www/certbot
    networks:
      - wp-network
    profiles:
     - tools

  certbot-renew:
    image: certbot/certbot
    container_name: wp-certbot-renew
    volumes:
     - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt
     - ${RUNTIME_DIR}/certbot/www:/var/www/certbot
    networks:
      - wp-network
    entrypoint: >
      /bin/sh -c
      "trap exit TERM;
       while :; do
         certbot renew;
         sleep 12h & wait $${!};
       done"
