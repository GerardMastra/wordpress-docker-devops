services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt:ro
      - ${RUNTIME_DIR}/certbot/www:/var/www/certbot:ro
    volumes_from:
      - php:ro

  php:
   volumes:
     - ${RUNTIME_DIR}/wordpress:/var/www/html

  certbot:
    image: certbot/certbot
    container_name: wp-certbot
    volumes:
     - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt
     - ${RUNTIME_DIR}/certbot/www:/var/www/certbot
    networks:
      - wp-network
    profiles:
     - tools

  certbot-renew:
    image: certbot/certbot
    container_name: wp-certbot-renew
    volumes:
     - ${RUNTIME_DIR}/certbot/conf:/etc/letsencrypt
     - ${RUNTIME_DIR}/certbot/www:/var/www/certbot
    networks:
      - wp-network
    entrypoint: >
      /bin/sh -c
      "trap exit TERM;
       while :; do
         certbot renew;
         sleep 12h & wait $${!};
       done"

  backup:
    build: ./backup
    container_name: backup-service
    depends_on:
      - mysql
    volumes:
      - wordpress_data:/var/www/html/wp-content
      - backup_data:/backup
    networks:
      - wp-network
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
    restart: always
