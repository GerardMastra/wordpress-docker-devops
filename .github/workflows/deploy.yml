name: CI/CD WordPress Docker

on:
  push:
    branches:
      - main
      - dev

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build imagen
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest ./php
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:${{ github.sha }}

      # Push imagen
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:${{ github.sha }}

  cd:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 2222

          script: |
            set -e

            cd ~/projecto-devops/repo/wordpress-docker-devops

            REF_NAME=${{ github.ref_name }}

            echo "Actualizando repo..."
            git fetch origin
            git reset --hard
            git clean -fd
            git checkout $REF_NAME
            git reset --hard origin/$REF_NAME

            echo "Descargando nueva imagen..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

            echo "Reiniciando servicios..."
            docker compose --env-file .env.prod down
            docker compose --env-file .env.prod up -d
