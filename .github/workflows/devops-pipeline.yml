name: DevOps Pipeline (Terraform + App)

on:
  push:
    branches: [ main, dev, feature ]
  pull_request:

env:
  TF_VERSION: 1.6.6

jobs:

# =========================
# 🧠 TERRAFORM CI
# =========================
  terraform-ci:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

# =========================
# 🚀 TERRAFORM CD
# =========================
  terraform-cd:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    needs: terraform-ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature'

    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export EC2 IP
        id: tf_output
        run: |
          # 1. Capturamos la salida cruda
          RAW_OUTPUT=$(terraform output -no-color -raw instance_public_ip 2>/dev/null)
          
          # 2. Usamos grep con una expresión regular para extraer SOLO la IP (bloque de números y puntos)
          # Esto descartará cualquier palabra como "Warning" o caracteres como "│"
          CLEAN_IP=$(echo "$RAW_OUTPUT" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | head -n 1)

          if [ -z "$CLEAN_IP" ]; then
            echo "❌ Error: No se pudo extraer una IP válida de la salida de Terraform."
            echo "Salida recibida: $RAW_OUTPUT"
            exit 1
          fi

          echo "IP filtrada con éxito: $CLEAN_IP"
          echo "ec2_ip=$CLEAN_IP" >> $GITHUB_OUTPUT

      - name: Debug EC2 IP
        run: |
          # Cambiamos needs por steps
          echo "IP = [${{ steps.tf_output.outputs.ec2_ip }}]"

      - name: Wait Bootstrap to finish
        run: |
          IP="${{ steps.tf_output.outputs.ec2_ip }}"
          echo "Esperando a que el bootstrap en $IP finalice..."

          if [ -z "$IP" ]; then
            echo "Error: La IP de la EC2 está vacía."
            exit 1
          fi

          # Guardamos la llave SSH en un archivo temporal para el chequeo
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          # Reintentar por 10 minutos (60 veces * 10 seg)
          for i in {1..60}; do
            # 1. Verificar si el puerto 22 está abierto
            if nc -z -w 5 "$IP" 22; then
              # 2. Verificar si el archivo de señal existe en la EC2
              if ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@$IP "test -f /var/log/bootstrap_finished"; then
                echo "✅ Bootstrap finalizado y Docker listo."
                rm private_key.pem
                exit 0
              fi
              echo "Intento $i: SSH activo pero el bootstrap sigue trabajando..."
            else
              echo "Intento $i: SSH aún no responde..."
            fi
            sleep 10
          done

          echo "❌ Timeout: El bootstrap no terminó en 10 minutos."
          rm private_key.pem
          exit 1

# =========================
# 🐳 APP CI (tu parte actual)
# =========================
  app-ci:
    runs-on: ubuntu-latest
    needs: terraform-ci

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download assets from S3
        env:
          MY_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          MY_S3_PATH: ${{ secrets.S3_PATH_WP }}
        run: |
          # if ! aws s3 cp s3://$MY_S3_BUCKET/$MY_S3_PATH ./php/wp-content.tar.gz; then
          #   echo "Error descargando S3"
          #   exit 1
          # fi
          aws s3 cp s3://gerardo-devops-wp/bootstrap/wordpress/wp-content.tar.gz ./php/wp-content.tar.gz
          cd php && tar -xzf wp-content.tar.gz && rm wp-content.tar.gz

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest -f ./php/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

# =========================
# 🚀 APP CD
# =========================
  app-cd:
    runs-on: ubuntu-latest
    needs: [terraform-cd, app-ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature'

    steps:
      - name: Deploy via SSH usando IP dinámica
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-cd.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Asegurar que dig esté disponible para el diagnóstico
            if ! command -v dig &> /dev/null; then
              echo "🔧 Instalando dnsutils para diagnóstico de red..."
              sudo apt-get update && sudo apt-get install -y dnsutils
            fi

            # --- DIAGNÓSTICO DE RED ---
            PUBLIC_IP=$(curl -s http://checkip.amazonaws.com)
            FULL_DOMAIN="gerardo-devops-wp.duckdns.org" # Para el dig
            SUB_DOMAIN="gerardo-devops-wp"             # Solo el nombre para la API
            
            DNS_RESOLVED=$(dig +short $FULL_DOMAIN | tail -n1)

            echo "🔍 DIAGNÓSTICO:"
            echo "Mi IP Pública real: $PUBLIC_IP"
            echo "IP que resuelve DuckDNS: $DNS_RESOLVED"

            if [ "$PUBLIC_IP" != "$DNS_RESOLVED" ]; then
              echo "❌ ERROR: DuckDNS no apunta a esta instancia."
              echo "Intentando actualizar manualmente..."
              
              # IMPORTANTE: El parámetro 'domains' NO lleva el .duckdns.org
              UPDATE_RES=$(curl -s "https://www.duckdns.org/update?domains=$SUB_DOMAIN&token=${{ secrets.DUCKDNS_TOKEN }}&ip=$PUBLIC_IP")
              
              echo "Respuesta de DuckDNS: $UPDATE_RES"
              
              if [ "$UPDATE_RES" != "OK" ]; then
                echo "🚨 Error crítico: DuckDNS rechazó la actualización (Token o Dominio inválidos)."
                # No salimos con error aquí para intentar ver si el DNS se propaga igual, 
                # pero ya sabemos que probablemente falle Certbot.
              fi
              
              echo "Esperando 45 segundos para propagación..."
              sleep 45
            else
              echo "✅ DNS sincronizado correctamente."
            fi

            # Espera de cortesía por si el grupo docker no se refrescó
            sleep 5

            # Verificar si Docker está realmente instalado
            if ! command -v docker &> /dev/null; then
              echo "🚨 Docker no fue detectado. Forzando instalación rápida..."
              sudo apt-get update && sudo apt-get install -y docker.io
            fi

            # 1. Definir ruta absoluta (evitamos ~ en rutas de configuración)
            REPO_DIR="/home/ubuntu/projecto-devops/repo/wordpress-docker-devops"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p /home/ubuntu/projecto-devops/repo

            # 2. Clonar o actualizar
            if [ ! -d "$REPO_DIR" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin
            git reset --hard origin/main

            # 3. Crear el archivo .env.prod dinámicamente

            # Usamos trim para eliminar posibles saltos de línea o espacios en los secrets
            cat <<EOF > .env.prod
ENV_FILE=.env.prod
RUNTIME_DIR=/opt/wordpress-runtime
MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
MYSQL_USER=${{ secrets.MYSQL_USER }}
MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
SSL_EMAIL=${{ secrets.SSL_EMAIL }}
DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
WP_TABLE_PREFIX=wp_
WP_DEBUG=false
WP_HOME=https://${{ secrets.DOMAIN_NAME }}
WP_SITEURL=https://${{ secrets.DOMAIN_NAME }}
S3_BUCKET=$(echo "${{ secrets.S3_BUCKET }}" | tr -d '[:space:]')
S3_PATH_WP=$(echo "${{ secrets.S3_PATH_WP }}" | tr -d '[:space:]')
S3_PATH_DB=$(echo "${{ secrets.S3_PATH_DB }}" | tr -d '[:space:]')
AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
AWS_REGION=${{ secrets.AWS_REGION }}
DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
EOF

            # VALIDACIÓN (Solo para debug, puedes quitarlo después)
            echo "🔍 Verificando rutas generadas:"
            grep "S3_" .env.prod

            # 4. Pull y Reinicio
            echo "Pull imagen de Docker Hub..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

            echo "🔍 Verificando que el dominio apunte a la IP actual..."
            DOMAIN="gerardo-devops-wp.duckdns.org"
            CURRENT_IP=$(curl -s http://checkip.amazonaws.com)

            # Un pequeño bucle de espera antes de lanzar Certbot
            for i in {1..10}; do
              DNS_IP=$(dig +short $DOMAIN | tail -n1)
              if [ "$DNS_IP" = "$CURRENT_IP" ]; then
                echo "✅ Dominio listo para Certbot."
                break
              fi
              echo "⏳ El DNS aún apunta a $DNS_IP. Esperando..."
              sleep 15
            done

            echo "Restart servicios..."
            sudo make down ENV=prod || true
            sudo make up-prod ENV=prod
