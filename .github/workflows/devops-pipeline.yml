name: DevOps Pipeline (Terraform + App)

on:
  push:
    branches: [ main, dev ]
  pull_request:

env:
  TF_VERSION: 1.6.6

jobs:

# =========================
# 🧠 TERRAFORM CI
# =========================
  terraform-ci:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

# =========================
# 🚀 TERRAFORM CD
# =========================
  terraform-cd:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    needs: terraform-ci
    if: github.ref == 'refs/heads/main'

    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export EC2 IP
        id: tf_output
        run: |
          echo "ec2_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

      - name: Debug EC2 IP
        run: |
          # Cambiamos needs por steps
          echo "IP = [${{ steps.tf_output.outputs.ec2_ip }}]"

      - name: Wait for EC2 SSH
        run: |
          IP="${{ steps.tf_output.outputs.ec2_ip }}"
          if [ -z "$IP" ]; then
            echo "Error: La IP de la EC2 está vacía."
            exit 1
          fi

          echo "Esperando a que EC2 ($IP) esté lista y el bootstrap finalice..."

          # Aumentamos a 60 intentos (10 minutos total) si el bootstrap es pesado
          for i in {1..60}; do
            # Usamos una validación más robusta que nc
            if nc -w 5 -z "$IP" 22; then
              echo "SSH detectado en puerto 22."
              # Opcional: intentar un comando real por SSH para confirmar que el SO respondió
              exit 0
            fi
            echo "Intento $i/60: SSH aún no responde..."
            sleep 10
          done
          echo "Timeout: La instancia no respondió tras 10 minutos."
          exit 1

# =========================
# 🐳 APP CI (tu parte actual)
# =========================
  app-ci:
    runs-on: ubuntu-latest
    needs: terraform-ci

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download assets from S3
        env:
          MY_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          MY_S3_PATH: ${{ secrets.S3_PATH_WP }}
        run: |
          # if ! aws s3 cp s3://$MY_S3_BUCKET/$MY_S3_PATH ./php/wp-content.tar.gz; then
          #   echo "Error descargando S3"
          #   exit 1
          # fi
          aws s3 cp s3://gerardo-devops-wp/bootstrap/wordpress/wp-content.tar.gz ./php/wp-content.tar.gz
          cd php && tar -xzf wp-content.tar.gz && rm wp-content.tar.gz

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest -f ./php/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

# =========================
# 🚀 APP CD
# =========================
  app-cd:
    runs-on: ubuntu-latest
    needs: [terraform-cd, app-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH usando IP dinámica
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-cd.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            # 1. Definir ruta absoluta (evitamos ~ en rutas de configuración)
            REPO_DIR="/home/ubuntu/projecto-devops/repo/wordpress-docker-devops"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p /home/ubuntu/projecto-devops/repo

            # 2. Clonar o actualizar
            if [ ! -d "$REPO_DIR" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi
            
            cd "$REPO_DIR"
            git fetch origin
            git reset --hard origin/main

            # 3. Crear el archivo .env.prod dinámicamente
            # Usamos las variables que vienen de Secrets de GitHub
            echo "Generando archivo .env.prod..."
            cat <<EOF > .env.prod
            ENV_FILE=.env.prod
            RUNTIME_DIR=/opt/wordpress-runtime
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            SSL_EMAIL=${{ secrets.SSL_EMAIL }}
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            WP_TABLE_PREFIX=wp_
            WP_DEBUG=false
            WP_HOME=https://${{ secrets.DOMAIN_NAME }}
            WP_SITEURL=https://${{ secrets.DOMAIN_NAME }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_PATH_WP=${{ secrets.S3_PATH_WP }}
            S3_PATH_DB=${{ secrets.S3_PATH_DB }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # 4. Pull y Reinicio
            echo "Pull imagen de Docker Hub..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

            echo "Restart servicios..."
            # Forzamos a que use el archivo recién creado
            sudo make down ENV=prod
            sudo make up-prod ENV=prod
