name: DevOps Pipeline (Terraform + App)

on:
  push:
    branches: [ main, dev ]
  pull_request:

env:
  TF_VERSION: 1.6.6

jobs:

# =========================
# 🧠 TERRAFORM CI
# =========================
  terraform-ci:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

# =========================
# 🚀 TERRAFORM CD
# =========================
  terraform-cd:
    runs-on: ubuntu-latest

    env:
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}

    needs: terraform-ci
    if: github.ref == 'refs/heads/main'

    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export EC2 IP
        id: tf_output
        run: |
          echo "ec2_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for EC2 SSH
        run: |
          echo "Esperando a que EC2 esté lista..."
          for i in {1..30}; do
            nc -zv ${{ needs.terraform-cd.outputs.ec2_ip }} 2222 && echo "SSH listo" && exit 0
            echo "Intento $i..."
            sleep 10
          done
          echo "Timeout esperando SSH"
          exit 1

# =========================
# 🐳 APP CI (tu parte actual)
# =========================
  app-ci:
    runs-on: ubuntu-latest
    needs: terraform-ci

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download assets from S3
        env:
          MY_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          MY_S3_PATH: ${{ secrets.S3_PATH_WP }}
        run: |
          # if ! aws s3 cp s3://$MY_S3_BUCKET/$MY_S3_PATH ./php/wp-content.tar.gz; then
          #   echo "Error descargando S3"
          #   exit 1
          # fi
          aws s3 cp s3://gerardo-devops-wp/bootstrap/wordpress/wp-content.tar.gz ./php/wp-content.tar.gz
          cd php && tar -xzf wp-content.tar.gz && rm wp-content.tar.gz

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest -f ./php/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

# =========================
# 🚀 APP CD
# =========================
  app-cd:
    runs-on: ubuntu-latest
    needs: [terraform-cd, app-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH usando IP dinámica
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-cd.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 2222

          script: |
            set -e

            cd ~/projecto-devops/repo/wordpress-docker-devops

            echo "Actualizando repo..."
            git fetch origin
            git reset --hard origin/main

            echo "Pull imagen..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-devops:latest

            echo "Restart servicios..."
            sudo make down ENV=prod
            sudo make up-prod ENV=prod
