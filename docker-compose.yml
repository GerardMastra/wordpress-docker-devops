services:
  php:
    image: wordpress:php8.1-fpm
    container_name: wp-php
    env_file:
      - .env
    environment: # Añado esto para asegurar que WordPress lea las variables correctas.
# Uso WP en vezde WordPress porque así configure el config.php
	    WP_DB_HOST: mysql:3306
	    WP_DB_USER: ${MYSQL_USER}
	    WP_DB_PASSWORD: ${MYSQL_PASSWORD}
	WP_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - ./wordpress:/var/www/html


  nginx:
    image: nginx:latest
    container_name: wp-nginx
    ports:
      - "80:80" # Uso puerto 80 del contenedor en vezde el 8080
    volumes:
      - ./wordpress:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:5.7
    container_name: wp-mysql
    env_file:
      - .env
    volumes:
      - ./mysql/data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wp-phpmyadmin
    ports:
      - "8081:80"
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mysql
  
  wp-cli:
    image: wordpress:cli
    container_name: wp-cli
    depends_on:
      - php
      - mysql
    volumes:
      - ./wordpress:/var/www/html
    user: "33:33"
    env_file:
      - .env
