services:

  mysql:
    image: mysql:5.7
    container_name: wp-mysql
    restart: unless-stopped
    env_file:
      - ${ENV_FILE}
    volumes:
      - ${RUNTIME_DIR}/mysql/data:/var/lib/mysql
    networks:
      - wp-network
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  php:
    image: ${DOCKERHUB_USERNAME}/wordpress-devops:latest
    container_name: wp-php
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/docker-entrypoint-custom.sh"]
    command: ["php-fpm"]
    env_file:
       - ${ENV_FILE}
    volumes:
       - wordpress_data:/var/www/html
    environment:
      WP_DB_HOST: mysql:3306
      WP_DB_USER: ${MYSQL_USER}
      WP_DB_PASSWORD: ${MYSQL_PASSWORD}
      WP_DB_NAME: ${MYSQL_DATABASE}
      WP_HOME: ${WP_HOME}
      WP_SITEURL: ${WP_SITEURL}
    networks:
      - wp-network
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: wp-nginx
    restart: always
    depends_on:
      php:
        condition: service_started
    networks:
      - wp-network
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wp-phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    env_file:
      - ${ENV_FILE}
    environment:
      PMA_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wp-network
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true

  wp-cli:
    image: wordpress:cli
    container_name: wp-cli
    depends_on:
      mysql:
        condition: service_healthy
      php:
        condition: service_started
    volumes:
      - ${RUNTIME_DIR}/wordpress:/var/www/html
    user: "33:33"
    env_file:
      - ${ENV_FILE}
    environment:
      WP_DB_HOST: mysql:3306
      WP_DB_USER: ${MYSQL_USER}
      WP_DB_PASSWORD: ${MYSQL_PASSWORD}
      WP_DB_NAME: ${MYSQL_DATABASE}
    networks:
      - wp-network
    profiles:
      - tools

networks:
  wp-network:
    driver: bridge

volumes:
  wordpress_data:
  backup_data:
